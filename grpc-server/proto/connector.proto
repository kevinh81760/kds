syntax = "proto3";

package devices.protos.burgerbot;

service ConnectorService {
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CompleteOrder(CompleteOrderRequest) returns (CompleteOrderResponse);
  rpc MarkFailedOrder(MarkFailedOrderRequest) returns (MarkFailedOrderResponse);
}

message GetOrderRequest {
  uint32 tray_number = 1;
}

message GetOrderResponse {
  uint64 order_id = 1;
  uint64 client_id = 2;
  uint32 tray_number = 3;
  repeated OrderCommand commands = 4;
}

message OrderCommand {
  uint64 id = 1;
  string code = 2;
  float level = 3;
}

message CompleteOrderRequest {
  uint64 order_id = 1;
  uint64 client_id = 2;
}

message CompleteOrderResponse {}

message MarkFailedOrderRequest {
  uint64 order_id = 1;
  uint64 client_id = 2;
  repeated OrderResultCommand completed_commands = 3;
  repeated OrderResultCommand failed_commands = 4;
}

message MarkFailedOrderResponse {}

message OrderResultCommand {
  uint64 id = 1;
  bool is_disabled = 2;
}